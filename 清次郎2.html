<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清次郎合計（カスタム項目数）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-field {
            -moz-appearance: textfield;
        }
        .sticky-total {
            position: sticky;
            bottom: 0;
            z-index: 50;
        }
        input, button {
            min-height: 40px;
        }
    </style>
</head>
<body class="pb-32">
    <!-- Header -->
    <header class="bg-slate-800 text-white py-8 px-4 mb-8 text-center shadow-lg">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight">清次郎合計</h1>
        <p class="text-slate-400 text-sm mt-2">オノデラ(10項目) / その他(各2項目)</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 space-y-8">
        <div id="groupsContainer" class="space-y-10">
            <!-- JavaScript will inject groups here -->
        </div>

        <!-- Reset Button -->
        <div class="text-center pb-8">
            <button onclick="confirmReset()" class="px-8 py-3 bg-white text-red-600 border border-red-200 font-bold rounded-full hover:bg-red-50 transition-colors shadow-sm active:scale-95">
                全データをリセット
            </button>
        </div>
    </main>

    <!-- Floating Grand Total Bar -->
    <div class="sticky-total bg-white/95 backdrop-blur-md border-t border-gray-200 shadow-[0_-10px_25px_rgba(0,0,0,0.1)] p-4 md:p-6">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-6">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-left">Grand Total</span>
                    <p class="text-[10px] text-gray-500 text-left">各担当の確定金額（税込/税抜）の合算</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest block mb-1">総合計金額</span>
                <div class="text-4xl font-black text-slate-900 leading-none">
                    <span id="grandTotalDisplay">0</span><span class="text-xl ml-1 font-medium text-slate-500">円</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration: Person Name and their respective Item Count
        const PERSONS = [
            { name: "オノデラ", items: 10 },
            { name: "キクチ", items: 2 },
            { name: "イケダ", items: 2 },
            { name: "ホンジョウ", items: 2 },
            { name: "カトウ", items: 2 }
        ];

        function initApp() {
            const container = document.getElementById('groupsContainer');
            
            PERSONS.forEach((person, gIndex) => {
                const g = gIndex + 1;
                const groupSection = document.createElement('section');
                groupSection.className = 'bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow';
                
                let rowsHtml = '';
                for (let i = 1; i <= person.items; i++) {
                    rowsHtml += `
                        <div class="grid grid-cols-12 gap-2 md:gap-4 items-center py-2 border-b border-gray-50 last:border-0 px-2 md:px-0">
                            <div class="col-span-12 md:col-span-5">
                                <div class="flex items-center group">
                                    <span class="w-6 text-[10px] text-gray-300 font-mono group-hover:text-indigo-400 transition-colors">${i}</span>
                                    <input type="number" data-group="${g}" data-item="${i}" class="price-input w-full p-2 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:border-indigo-500 outline-none transition-all text-sm font-medium" placeholder="定価">
                                </div>
                            </div>
                            <div class="col-span-6 md:col-span-3">
                                <input type="number" data-group="${g}" data-item="${i}" value="0" class="qty-input w-full p-2 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:border-indigo-500 outline-none transition-all text-center text-sm font-bold text-indigo-600" placeholder="数量">
                            </div>
                            <div class="col-span-6 md:col-span-4 text-right pr-4">
                                <span class="text-[10px] text-gray-400 md:hidden block">小計</span>
                                <span id="subtotal-${g}-${i}" class="font-mono font-bold text-slate-600">0</span>
                            </div>
                        </div>
                    `;
                }

                groupSection.innerHTML = `
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex flex-wrap justify-between items-center gap-4">
                        <h2 class="font-black text-slate-800 text-lg flex items-center">
                            <span class="bg-slate-800 text-white w-2 h-6 rounded-full mr-3"></span>
                            ${person.name}
                            <span class="ml-2 text-[10px] text-slate-400 font-normal">(${person.items}項目)</span>
                        </h2>
                        
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center space-x-2 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
                                <span class="text-[10px] font-bold text-slate-500">消費税(10%)</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="taxGroup-${g}" class="sr-only peer group-tax-toggle" onchange="calculateEverything()">
                                    <div class="w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-600"></div>
                                </label>
                            </div>
                            <div class="text-right min-w-[120px]">
                                <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-tighter">Subtotal</span>
                                <span class="text-xl font-black text-indigo-700" id="groupTotal-${g}">0</span><span class="text-xs text-indigo-400 ml-1 font-bold">円</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 md:p-6">
                        <div class="hidden md:grid grid-cols-12 gap-4 mb-2 px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">
                            <div class="col-span-5">定価 (Price)</div>
                            <div class="col-span-3 text-center">数量 (Qty)</div>
                            <div class="col-span-4 text-right">小計 (Subtotal)</div>
                        </div>
                        ${rowsHtml}
                    </div>
                `;
                container.appendChild(groupSection);
            });

            document.querySelectorAll('.price-input, .qty-input').forEach(input => {
                input.addEventListener('input', calculateEverything);
            });
        }

        function calculateEverything() {
            let grandTotal = 0;

            PERSONS.forEach((person, gIndex) => {
                const g = gIndex + 1;
                let groupSumRaw = 0;
                
                for (let i = 1; i <= person.items; i++) {
                    const priceInput = document.querySelector(`.price-input[data-group="${g}"][data-item="${i}"]`);
                    const qtyInput = document.querySelector(`.qty-input[data-group="${g}"][data-item="${i}"]`);
                    
                    const price = parseFloat(priceInput.value) || 0;
                    const qty = parseFloat(qtyInput.value) || 0;
                    const subtotal = price * qty;
                    
                    document.getElementById(`subtotal-${g}-${i}`).textContent = subtotal.toLocaleString();
                    groupSumRaw += subtotal;
                }
                
                const isGroupTaxEnabled = document.getElementById(`taxGroup-${g}`).checked;
                let groupTotal = groupSumRaw;
                if (isGroupTaxEnabled) {
                    groupTotal = Math.floor(groupSumRaw * 1.1);
                }
                
                document.getElementById(`groupTotal-${g}`).textContent = groupTotal.toLocaleString();
                grandTotal += groupTotal;
            });

            document.getElementById('grandTotalDisplay').textContent = grandTotal.toLocaleString();
        }

        function confirmReset() {
            if (confirm('すべての入力をクリアしますか？')) {
                document.querySelectorAll('input[type="number"]').forEach(input => {
                    if (input.classList.contains('qty-input')) {
                        input.value = 0;
                    } else {
                        input.value = '';
                    }
                });
                document.querySelectorAll('.group-tax-toggle').forEach(toggle => {
                    toggle.checked = false;
                });
                calculateEverything();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
